name: Publish to NPM

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          if git rev-parse ${{ github.event.before }} >/dev/null 2>&1; then
            OLD_VERSION=$(git show ${{ github.event.before }}:package.json | jq -r .version)
          else
            OLD_VERSION="0.0.0"
          fi
          NEW_VERSION=$(jq -r .version package.json)
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed: $OLD_VERSION -> $NEW_VERSION"
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $NEW_VERSION"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: corepack enable && corepack prepare pnpm@latest --activate
      - run: pnpm install --frozen-lockfile
      - run: node scripts/publish.mjs
