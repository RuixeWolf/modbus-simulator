name: Publish to NPM

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is unpublished
        id: check
        run: |
          NPM_VERSION=$(npm view @ruixe/modbus-simulator version 2>/dev/null || echo "0.0.0")
          LOCAL_VERSION=$(jq -r .version package.json)
          if [ "$NPM_VERSION" != "$LOCAL_VERSION" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
            echo "Version not yet on NPM: $NPM_VERSION -> $LOCAL_VERSION"
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "Version already published: $LOCAL_VERSION"
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: corepack enable && corepack prepare pnpm@latest --activate
      - run: pnpm install --frozen-lockfile
      - run: node scripts/publish.mjs
        env:
          # Unset the placeholder token so npm falls back to OIDC Trusted Publishing
          NODE_AUTH_TOKEN: ''
